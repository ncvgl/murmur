<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>murmur</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
      background: #111;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    h1 { font-size: 20px; margin-right: auto; }
    #timer {
      font-size: 19px;
      font-variant-numeric: tabular-nums;
      color: #888;
    }
    #timer.active { color: #ef4444; }
    .statusRow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .trControls {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
      margin-left: auto;
    }
    .trControls select {
      background: #1a1a1a;
      color: #ddd;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .trControls select:disabled { opacity: 0.5; cursor: not-allowed; }
    .trControls label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    #status {
      font-size: 14px;
      color: #888;
      min-height: 20px;
    }
    #btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: background 0.2s;
    }
    #btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    #btn.recording { background: #dc2626; }
    #output {
      margin-top: 20px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    .line {
      display: grid;
      grid-template-columns: 90px 1fr 1fr;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 16px;
      line-height: 1.6;
    }
    body.no-translation .line { grid-template-columns: 90px 1fr; }
    body.no-translation .line .translated { display: none; }
    .line .ts {
      color: #555;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      padding-top: 2px;
    }
    .line .text {
      color: #ccc;
      word-break: break-word;
    }
    .line .translated {
      color: #9ca3af;
      word-break: break-word;
      font-style: normal;
    }
    .line .translated.pending { color: #555; font-style: italic; }
    .line.partial .text {
      color: #666;
      font-style: italic;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #222;
    }
    .actions button {
      flex: 1;
      padding: 14px;
      font-size: 15px;
      border: 1px solid #333;
      border-radius: 10px;
      cursor: pointer;
      background: #222;
      color: #888;
      transition: all 0.2s;
    }
    .actions button:active { background: #333; }
    .actions button.flash {
      color: #4ade80;
      border-color: #4ade80;
    }
  </style>
</head>
<body>
  <header>
    <h1>murmur</h1>
    <div id="timer">00:00</div>
  </header>
  <div class="statusRow">
    <div id="status">Loading...</div>
    <div class="trControls">
      <label><input type="checkbox" id="trToggle"> translate</label>
      <select id="trLang" disabled>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="nl">Dutch</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="zh">Chinese</option>
        <option value="jap">Japanese</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="tr">Turkish</option>
        <option value="pl">Polish</option>
        <option value="sv">Swedish</option>
        <option value="el">Greek</option>
      </select>
    </div>
  </div>
  <button id="btn" disabled>Start Meeting</button>
  <div id="output"></div>
  <div class="actions">
    <button id="copyBtn">Copy</button>
    <button id="downloadBtn">Download .txt</button>
  </div>
  <script>
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;text-align:center;color:#888;font-size:16px;padding:24px;">murmur is desktop only for now.</div>';
    }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
